[advisories]
version = 2
yanked = "deny"
# `rsa` is an optional, disabled SQLx MySQL dependency retained in Cargo.lock;
# the platform enables PostgreSQL only and `cargo tree -i rsa --target all` is empty.
# No fixed release exists. Remove this exception when SQLx drops the lock-only edge.
ignore = ["RUSTSEC-2023-0071"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
