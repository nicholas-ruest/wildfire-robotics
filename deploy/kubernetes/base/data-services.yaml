apiVersion: v1
kind: Service
metadata: {name: postgres}
spec: {clusterIP: None, selector: {app: postgres}, ports: [{name: postgres, port: 5432}]}
---
apiVersion: v1
kind: Service
metadata: {name: nats}
spec: {clusterIP: None, selector: {app: nats}, ports: [{name: client, port: 4222}, {name: leaf, port: 7422}]}
---
apiVersion: v1
kind: Service
metadata: {name: object-storage}
spec: {clusterIP: None, selector: {app: object-storage}, ports: [{name: https, port: 443}]}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: data-service-contracts}
data:
  postgres.endpoint: postgres.wildfire-system.svc:5432
  postgres.extensions: postgis
  nats.endpoint: tls://nats.wildfire-system.svc:4222
  nats.jetstream: required
  object.endpoint: https://object-storage.wildfire-system.svc
  object.versioning: required
  object.immutability: required
  credentials.source: external-secret-manager-only
