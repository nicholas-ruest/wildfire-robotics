apiVersion: v1
kind: ConfigMap
metadata: {name: station-profile}
data:
  profile: lightweight-offline
  signed_bundle_required: "true"
  local_command_policy: cached-unexpired-only
  reconciliation: no-expired-authority-no-blind-command-replay
  priority: identity,safety,command,audit,mission,map,telemetry
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: station-default-deny}
spec: {podSelector: {}, policyTypes: [Ingress, Egress]}
