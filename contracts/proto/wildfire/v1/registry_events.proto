syntax = "proto3";

package wildfire.v1;

import "google/protobuf/timestamp.proto";
import "wildfire/v1/canonical.proto";

// Payload schemas for every entry in the published-language registry.
// Collections are bounded by producer conformance: repeated IDs <= 10,000,
// evidence <= 128, alternatives <= 32, and free text <= 4 KiB. Payloads over
// 1 MiB use ArtifactReference. Field numbers 100-199 are governance-reserved.

message QuantityValue { double value = 1; string unit = 2; optional double uncertainty = 3; reserved 100 to 199; }
message SpatialTemporalReference { optional ArtifactReference geometry = 1; google.protobuf.Timestamp valid_from = 2; optional google.protobuf.Timestamp valid_until = 3; string crs = 4; reserved 100 to 199; }
message VersionedReference { string id = 1; string version = 2; optional string digest_sha256 = 3; reserved 100 to 199; }
message DistributionSummary { double minimum = 1; double expected = 2; double maximum = 3; string unit = 4; double confidence = 5; reserved 100 to 199; }

message DeviceTrustChanged { string device_id = 1; string trust_state = 2; string reason = 3; google.protobuf.Timestamp effective_at = 4; string policy_version = 5; reserved 100 to 199; }
message AuthorityGrantChanged { string grant_id = 1; string principal_id = 2; repeated Scope scopes = 3; repeated string permissions = 4; google.protobuf.Timestamp valid_from = 5; google.protobuf.Timestamp valid_until = 6; repeated string approver_ids = 7; reserved 100 to 199; }
message ObservationAccepted { string source_id = 1; SpatialTemporalReference spacetime = 2; QuantityValue measurement = 3; string quality = 4; ArtifactReference provenance = 5; string license = 6; reserved 100 to 199; }
message HazardPictureUpdated { string region_id = 1; SpatialTemporalReference validity = 2; ArtifactReference picture = 3; double confidence = 4; uint64 freshness_millis = 5; reserved 100 to 199; }
message VisualEvidenceIndexed { ArtifactReference media_manifest = 1; SpatialTemporalReference footprint = 2; string sensor_quality = 3; VersionedReference index = 4; VersionedReference model = 5; reserved 100 to 199; }
message LightningRiskAreaPublished { repeated VersionedReference inputs = 1; VersionedReference baseline = 2; VersionedReference model = 3; SpatialTemporalReference area = 4; double ignition_probability = 5; double uncertainty = 6; uint32 priority = 7; google.protobuf.Timestamp expires_at = 8; reserved 100 to 199; }
message ForecastPublished { VersionedReference model = 1; repeated VersionedReference inputs = 2; string run_id = 3; SpatialTemporalReference horizon = 4; double uncertainty = 5; ArtifactReference forecast = 6; google.protobuf.Timestamp expires_at = 7; reserved 100 to 199; }
message RecommendationPublished { repeated EvidenceReference evidence = 1; repeated string alternatives = 2; double confidence = 3; repeated string limitations = 4; google.protobuf.Timestamp expires_at = 5; reserved 100 to 199; }
message AssignmentIssued { string assignment_id = 1; AuthorityReference authority = 2; string objective = 3; SpatialTemporalReference geography_and_validity = 4; repeated string constraint_versions = 5; repeated string approver_ids = 6; reserved 100 to 199; }
message RestrictionChanged { string restriction_id = 1; Scope scope = 2; string restriction = 3; google.protobuf.Timestamp effective_at = 4; optional uint64 superseded_version = 5; reserved 100 to 199; }
message MissionAuthorized { string mission_id = 1; string assignment_id = 2; string plan_sha256 = 3; ArtifactReference allocation = 4; OddReference odd = 5; repeated string constraint_versions = 6; google.protobuf.Timestamp valid_until = 7; reserved 100 to 199; }
message MissionStateChanged { string mission_id = 1; string prior_state = 2; string current_state = 3; string reason = 4; string actor_id = 5; google.protobuf.Timestamp changed_at = 6; reserved 100 to 199; }
message CapabilityAttested { string vehicle_id = 1; string capability = 2; string assurance_level = 3; OddReference odd = 4; VersionedReference configuration = 5; repeated EvidenceReference evidence = 6; google.protobuf.Timestamp expires_at = 7; reserved 100 to 199; }
message VehicleGrounded { string vehicle_id = 1; string reason = 2; google.protobuf.Timestamp effective_at = 3; string clearance_requirement = 4; reserved 100 to 199; }
message FleetCellChanged { string cell_id = 1; uint64 epoch = 2; Scope scope = 3; ArtifactReference capacity_summary = 4; ArtifactReference members = 5; string cause = 6; reserved 100 to 199; }
message CollaborationProfilePromoted { string cohort_id = 1; string context = 2; VersionedReference relationship_model = 3; ArtifactReference features_and_evidence = 4; google.protobuf.Timestamp valid_until = 5; reserved 100 to 199; }
message BatteryEligibilityChanged { string battery_id = 1; repeated string compatible_vehicle_ids = 2; DistributionSummary energy = 3; DistributionSummary power = 4; DistributionSummary health = 5; bool quarantined = 6; google.protobuf.Timestamp expires_at = 7; reserved 100 to 199; }
message RobotRecoveryRequested { string robot_id = 1; SpatialTemporalReference location = 2; string last_state = 3; repeated string exposures = 4; repeated string estimated_hazards = 5; QuantityValue mass = 6; VersionedReference configuration = 7; uint32 urgency = 8; repeated EvidenceReference evidence = 9; reserved 100 to 199; }
message IntentAcknowledged { string command_id = 1; string vehicle_id = 2; VersionedReference adapter = 3; string acknowledgement_class = 4; google.protobuf.Timestamp vehicle_time = 5; ClockQuality clock_quality = 6; reserved 100 to 199; }
message TelemetryNormalized { string vehicle_id = 1; google.protobuf.Timestamp sample_time = 2; ClockQuality clock_quality = 3; string quality = 4; optional ArtifactReference position_or_state = 5; reserved 100 to 199; }
message StationAvailabilityChanged { string station_id = 1; repeated string services = 2; DistributionSummary energy = 3; string connectivity = 4; ArtifactReference capacity = 5; uint64 freshness_millis = 6; reserved 100 to 199; }
message ConnectivityMapUpdated { optional string cell_id = 1; optional string region_id = 2; repeated string service_classes = 3; ArtifactReference coverage_and_quality = 4; SpatialTemporalReference validity = 5; ArtifactReference source_manifest = 6; reserved 100 to 199; }
message HabitatReadinessChanged { string habitat_id = 1; ArtifactReference deployable_assets_by_class = 2; repeated string energy_constraints = 3; repeated string charge_constraints = 4; repeated string maintenance_constraints = 5; repeated string communication_constraints = 6; uint64 freshness_millis = 7; reserved 100 to 199; }
message ChargeSessionChanged { string session_id = 1; optional string battery_id = 2; optional string vehicle_id = 3; string charger_id = 4; string state = 5; QuantityValue scheduled_energy = 6; QuantityValue actual_energy = 7; QuantityValue power = 8; optional string anomaly_or_reason = 9; google.protobuf.Timestamp changed_at = 10; reserved 100 to 199; }
message EnergyShortfallPredicted { string habitat_id = 1; SpatialTemporalReference period = 2; DistributionSummary critical_energy = 3; DistributionSummary available_energy = 4; string cause = 5; string shed_state = 6; repeated string alternatives = 7; reserved 100 to 199; }
message DeliveryStateChanged { string delivery_id = 1; string mission_id = 2; string custody_id = 3; string route_or_source_id = 4; string state = 5; QuantityValue quantity = 6; repeated string exceptions = 7; reserved 100 to 199; }
message SupplyShortagePredicted { string resource_id = 1; SpatialTemporalReference place_and_time = 2; DistributionSummary demand = 3; DistributionSummary stock = 4; DistributionSummary lead_time = 5; string bottleneck = 6; repeated string alternatives = 7; reserved 100 to 199; }
message PodCustodyChanged { string pod_id = 1; string manifest_sha256 = 2; string origin_id = 3; string destination_id = 4; string custodian_id = 5; QuantityValue mass = 6; string energy_isolation = 7; string state = 8; google.protobuf.Timestamp changed_at = 9; reserved 100 to 199; }
message MobilizationWaveChanged { string wave_id = 1; map<string, uint64> capability_counts = 2; ArtifactReference pod_carrier_corridor_plan = 3; DistributionSummary useful_arrival = 4; repeated string bottlenecks = 5; repeated string exceptions = 6; reserved 100 to 199; }
message TreatmentCompleted { string prescription_id = 1; string treatment_unit_id = 2; ArtifactReference planned_geometry = 3; ArtifactReference actual_geometry = 4; string method = 5; string tool = 6; repeated QuantityValue quantities = 7; repeated string exceptions = 8; repeated EvidenceReference evidence = 9; reserved 100 to 199; }
message EffectivenessAssessed { string treatment_id = 1; repeated SpatialTemporalReference observation_horizons = 2; ArtifactReference pre_fuel_state = 3; ArtifactReference post_fuel_state = 4; string outcome = 5; double uncertainty = 6; repeated EvidenceReference evidence = 7; reserved 100 to 199; }
message MaintenanceCompleted { string robot_id = 1; VersionedReference configuration = 2; string policy_version = 3; string work_order_id = 4; repeated string procedures = 5; repeated string part_ids = 6; ArtifactReference measurements_and_tests = 7; repeated string limitations = 8; reserved 100 to 199; }
message RobotRecovered { string robot_id = 1; string recovery_mission_id = 2; string scene_state = 3; string energy_state = 4; string contamination_state = 5; string custody_destination_id = 6; repeated EvidenceReference evidence = 7; reserved 100 to 199; }
message RobotQuarantined { string robot_id = 1; optional string battery_id = 2; repeated string hazard_classes = 3; repeated string isolation_requirements = 4; SpatialTemporalReference location = 5; string monitoring_requirements = 6; AuthorityReference release_authority = 7; reserved 100 to 199; }
message RobotRecertified { string robot_id = 1; VersionedReference configuration = 2; repeated EvidenceReference repair_parts_calibration_and_burn_in = 3; repeated string approved_capability_limitations = 4; reserved 100 to 199; }
message RobotRetired { string robot_id = 1; repeated EvidenceReference depower_sanitization_and_disposition = 2; string trust_revocation_id = 3; optional string salvage_destination_id = 4; reserved 100 to 199; }
message BlanketConfigurationPromoted { VersionedReference payload = 1; VersionedReference material = 2; VersionedReference panel = 3; VersionedReference tether = 4; VersionedReference parafoil = 5; VersionedReference cradle = 6; VersionedReference robot = 7; string stage = 8; OddReference odd = 9; repeated EvidenceReference evidence = 10; google.protobuf.Timestamp expires_at = 11; reserved 100 to 199; }
message PayloadLoadApproved { VersionedReference aircraft = 1; ArtifactReference reconciled_manifest = 2; ArtifactReference mass_properties = 3; ArtifactReference loading_and_release_envelope = 4; repeated string approver_ids = 5; reserved 100 to 199; }
message PayloadReleased { string mission_id = 1; string release_id = 2; repeated string authorization_digests = 3; VersionedReference aircraft_configuration = 4; VersionedReference payload_configuration = 5; SpatialTemporalReference release_spacetime = 6; ArtifactReference release_conditions = 7; ArtifactReference predicted_footprint = 8; reserved 100 to 199; }
message DeploymentPhaseChanged { string deployment_id = 1; string prior_phase = 2; string current_phase = 3; string cohort_or_panel_scope = 4; ArtifactReference stability_tension_and_vent_state = 5; string navigation_quality = 6; ClockQuality clock_quality = 7; double contingency_margin = 8; reserved 100 to 199; }
message BlanketActivated { ArtifactReference installed_footprint_and_panels = 1; repeated string gaps_and_omissions = 2; uint64 sensor_freshness_millis = 3; ArtifactReference exposure_envelope = 4; google.protobuf.Timestamp valid_until = 5; reserved 100 to 199; }
message ComponentDispositionChanged { string component_id = 1; repeated string exposures = 2; string damage_state = 3; string contamination_state = 4; string custody_id = 5; string disposition = 6; reserved 100 to 199; }
message SuppressionStateChanged { string operation_id = 1; ArtifactReference envelope = 2; string state = 3; ArtifactReference agent_and_dose_summary = 4; string reason = 5; reserved 100 to 199; }
message ConstraintPublished { VersionedReference constraint_set = 1; Scope scope = 2; OddReference odd = 3; SpatialTemporalReference validity = 4; bytes signature = 5; optional string supersedes_version = 6; reserved 100 to 199; }
message PromotionChanged { VersionedReference subject_release_or_capability = 1; string stage = 2; OddReference odd = 3; repeated EvidenceReference evidence = 4; string decision = 5; reserved 100 to 199; }
message SafetyOccurrenceReported { string occurrence_id = 1; string occurrence_class = 2; Scope scope = 3; google.protobuf.Timestamp occurred_at = 4; repeated string immediate_controls = 5; repeated EvidenceReference evidence = 6; reserved 100 to 199; }
message EntitlementChanged { string tenant_id = 1; string product = 2; map<string, uint64> limits = 3; google.protobuf.Timestamp effective_from = 4; google.protobuf.Timestamp effective_until = 5; string contract_version = 6; reserved 100 to 199; }
message SupportEscalated { string case_id = 1; string severity = 2; string tenant_id = 3; repeated string affected_service_or_asset_ids = 4; ArtifactReference safe_contact_data = 5; reserved 100 to 199; }
message InvestmentCasePublished { string scenario_id = 1; repeated VersionedReference models = 2; ArtifactReference fact_manifest = 3; repeated string strategies = 4; DistributionSummary net_present_value = 5; DistributionSummary internal_rate_of_return = 6; DistributionSummary payback = 7; DistributionSummary total_cost_of_ownership = 8; repeated string assumptions = 9; reserved 100 to 199; }
