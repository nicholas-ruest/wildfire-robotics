schema_version = 1
context = "Aerial Deployment Operations"
crate = "aerial-deployment-operations"
owner = "team-aerial-deployment"
invariant_namespace = "AD-INV-"
event_namespace = "wildfire.aerial_deployment_operations.v1"
protobuf_namespace = "wildfire.aerial_deployment.v1"

aggregates = ["BlanketConfiguration", "MembraneAssembly", "PayloadManifest", "AerialDropMission", "ReleaseAuthorization", "AirborneDeployment", "GroundInstallation"]
values = ["BlanketConfigurationId", "MaterialRevisionId", "PanelId", "JointId", "VentId", "AnchorId", "TetherId", "ReelId", "ParafoilId", "CradleId", "RobotId", "AircraftConfigurationId", "PayloadManifestId", "ReleaseCorridorId", "FootprintId", "ExclusionZoneId", "JettisonZoneId", "EmergencyLandingZoneId", "AssemblyId", "AerialDropMissionId", "ReleaseAuthorizationId", "AirborneDeploymentId", "GroundInstallationId", "EvidenceId", "OddId", "CommandId", "EventId", "ComponentId", "EffectivenessStudyId", "EvidenceRef", "OperationScope", "QualificationStage", "AssemblyPhase", "ManifestPhase", "MissionPhase", "ReleasePhase", "DeploymentPhase", "InstallationPhase", "ComponentDisposition"]
events = ["BlanketConfigurationRegistered", "BlanketConfigurationPromoted", "BlanketConfigurationSuspended", "MembraneStateChanged", "PayloadLoadApproved", "PayloadAccounted", "AerialDropMissionAuthorized", "AerialDropMissionChanged", "ReleaseArmed", "PayloadReleased", "ReleaseAborted", "DeploymentPhaseChanged", "PanelIsolated", "SectionJettisoned", "BlanketActivated", "BlanketDegraded", "BlanketRecovered", "ComponentDispositionChanged"]

[dependencies]
allowed = ["chrono", "serde", "thiserror", "shared-kernel", "contracts-generated"]
forbidden = ["aircraft vendor SDKs", "ruv-drone", "database clients/ORMs", "message brokers", "web frameworks", "simulation engines", "other bounded-context domain crates"]

[external_ownership]
aircraft_flight_and_release_veto = "Aircraft authority/crew adapter"
incident_objective_and_area = "Incident Command"
robot_allocation_and_leases = "Mission Control"
capability_and_eligibility = "Fleet Operations"
safety_promotion_and_constraints = "Safety Assurance"
suppressant_application = "Suppression Operations"
vegetation_treatment = "Vegetation Management"
custody = "Logistics"
repair_and_disposition = "Robot Care and Recovery"
